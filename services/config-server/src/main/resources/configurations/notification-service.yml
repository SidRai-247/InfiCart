server:
  port: 8040
spring:
  data:
    mongodb:
      uri: mongodb://siddharth:siddharth@localhost:27017/notification?authSource=admin&authMechanism=SCRAM-SHA-256
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: paymentGroup,orderGroup
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: orderConfirmation:com.siddharth.ecommerce.kafka.order.OrderConfirmation,paymentConfirmation:com.siddharth.ecommerce.kafka.payment.PaymentConfirmation
  mail:
    host: localhost
    port: 1025
    username: siddharth
    password: siddharth
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000
